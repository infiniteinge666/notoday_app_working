<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NoToday</title>

  <link rel="stylesheet" href="./styles/styles.css" />
</head>

<body class="state-idle">

  <!-- LAYER 3: FX -->
  <div class="fx-layer"></div>

  <!-- LAYER 2: STATE IMAGE -->
  <div class="state-layer"></div>

  <!-- LAYER 0: UI CORE -->
  <main class="ui-layer">

    <!-- TOP -->
    <section class="zone zone-top">
      <img src="./assets/notoday-shield.svg" class="logo" />
    </section>

    <!-- MIDDLE -->
    <section class="zone zone-middle">

      <div class="middle-stack">

        <div class="glass input-box">
          <textarea id="scanInput" placeholder="Paste message, link, email..."></textarea>
        </div>

        <div class="actions">
          <button id="pasteBtn">Paste</button>
          <button id="uploadBtn">Upload</button>
          <button id="clearBtn">Clear</button>
        </div>

        <div id="resultBox">
          <h2 id="resultHeading"></h2>
          <p id="resultReason"></p>
        </div>

      </div>

    </section>

    <!-- BOTTOM (EMPTY – button is fixed layer) -->
    <section class="zone zone-bottom"></section>

  </main>

  <!-- LAYER 1: INTERACTION -->
  <div class="interaction-layer">
    <button id="scanBtn" class="scan-btn">RUN SCAN</button>
  </div>

  <input type="file" id="fileInput" accept="image/*" hidden />

  <script src="./app.js"></script>

</body>
</html>
