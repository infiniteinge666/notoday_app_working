<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NoToday</title>

  <link rel="stylesheet" href="./styles/styles.css" />
</head>

<body class="state-idle">

  <!-- FX -->
  <div class="fx-layer">
    <div class="beam beam-1"></div>
    <div class="beam beam-2"></div>
    <div class="dust"></div>
  </div>

  <!-- STATE -->
  <div class="state-layer"></div>

  <!-- UI -->
  <main class="ui-layer">

    <!-- LOGO -->
    <div class="logo-wrap">
      <img src="./assets/notoday-shield.svg" class="logo" />
    </div>

    <!-- GLASS -->
    <div class="glass-sheet">

      <textarea id="scanInput" placeholder="Paste message, link, email..."></textarea>

      <div class="actions">

        <div class="button-wrap">
          <div class="button-shadow"></div>
          <button id="pasteBtn"><span>Paste</span></button>
        </div>

        <div class="button-wrap">
          <div class="button-shadow"></div>
          <button id="uploadBtn"><span>Upload</span></button>
        </div>

        <div class="button-wrap">
          <div class="button-shadow"></div>
          <button id="clearBtn"><span>Clear</span></button>
        </div>

      </div>

      <div id="resultBox">
        <h2 id="resultHeading"></h2>
        <p id="resultReason"></p>
      </div>

      <!-- SCAN BUTTON (NOW INSIDE GLASS) -->
      <div class="button-wrap scan-wrap">
        <div class="button-shadow"></div>
        <button id="scanBtn" class="cta">
          <span>RUN SCAN</span>
        </button>
      </div>

    </div>

  </main>

  <input type="file" id="fileInput" accept="image/*" hidden />

  <script src="./app.js"></script>

</body>
</html>
