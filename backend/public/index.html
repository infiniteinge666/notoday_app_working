<body class="state-idle">

  <!-- LAYER 3: FX -->
  <div class="fx-layer"></div>

  <!-- LAYER 2: STATE IMAGE -->
  <div class="state-layer"></div>

  <!-- LAYER 0: UI CORE -->
  <main class="ui-layer">

    <!-- TOP -->
    <div class="top">
      <img src="./assets/notoday-shield.svg" class="logo" />
    </div>

    <!-- MIDDLE -->
    <div class="middle">

      <div class="glass input-box">
        <textarea id="scanInput" placeholder="Paste message, link, email..."></textarea>
      </div>

      <div class="actions">
        <button id="pasteBtn">Paste</button>
        <button id="uploadBtn">Upload</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div id="resultBox"></div>

    </div>

  </main>

  <!-- LAYER 1: INTERACTION (ALWAYS ON TOP) -->
  <div class="interaction-layer">
    <button id="scanBtn" class="scan-btn">RUN SCAN</button>
  </div>

  <input type="file" id="fileInput" accept="image/*" hidden />

  <script src="./app.js"></script>
</body>
