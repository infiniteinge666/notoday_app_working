<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NoToday</title>

  <link rel="stylesheet" href="./styles/styles.css" />
</head>

<body>

  <div class="light-rays"></div>
  <div class="dust"></div>

  <div class="app">

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img src="assets/notoday-shield.svg" class="logo" />
    </div>

    <h1 class="title">Check before you trust.</h1>

    <div class="top-actions">
      <button id="clearBtn" class="soft-btn">Clear</button>

      <button id="uploadBtn" class="soft-btn icon" aria-label="Upload screenshot">
        <img src="assets/upload-icon.png" alt="" />
      </button>

      <input type="file" id="fileInput" accept="image/*" hidden />
    </div>

    <div class="card">
      <label class="label">What do you want to check?</label>
      <textarea id="input" class="input" placeholder="Paste a message, link, email..."></textarea>
    </div>

    <div id="result" class="result hidden"></div>

  </div>

  <div class="bottom-bar">
    <button id="scanBtn" class="cta">RUN SCAN</button>
  </div>

  <script src="app.js"></script>

</body>
</html>
