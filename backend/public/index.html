<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoToday</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- STYLES -->
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/background.css">
  <link rel="stylesheet" href="./styles/landing.css">
  <link rel="stylesheet" href="./styles/scan.css">
  <link rel="stylesheet" href="./styles/result.css">
  <link rel="stylesheet" href="./styles/motion.css">
</head>

<body class="theme-landing">

  <!-- =========================
       PULSE BACKGROUND
  ========================= -->
  <div id="pulseBg">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
  </div>

  <!-- =========================
       LANDING SCREEN
  ========================= -->
  <main id="landing" class="screen active">
    <div class="landing-shell">

      <div class="logo-wrap">
        <img src="./assets/notoday-shield.svg" class="logo" alt="NoToday">
      </div>

      <button id="startBtn" class="primary-btn">
        SCAN NOW
      </button>

    </div>
  </main>

  <!-- =========================
       SCAN SCREEN
  ========================= -->
  <main id="scan" class="screen">
    <div class="scan-screen-shell">

      <div class="scan-card-wrap">
        <div class="card">

          <h1>What are they asking you to do?</h1>

          <textarea id="scanInput" placeholder="Paste message, email, or link..."></textarea>

          <p id="validationMessage"></p>

          <div class="input-grid">
            <button id="pasteBtn" class="input-btn">📋 Paste</button>
            <button class="input-btn disabled" disabled>📸 Screenshot</button>
            <button class="input-btn disabled" disabled>🎙 Voice</button>
            <button class="input-btn disabled" disabled>🔗 Link</button>
          </div>

        </div>
      </div>

      <div class="scan-action-zone">
        <button id="scanBtn" class="primary-btn">
          RUN SCAN
        </button>
      </div>

    </div>
  </main>

  <!-- =========================
       RESULT SCREEN
  ========================= -->
  <main id="result" class="screen">
    <div class="result-shell">

      <h1 id="resultHeading">Checking...</h1>

      <p id="resultReason">Do not act yet.</p>

      <button id="scanAgainBtn" class="primary-btn">
        SCAN AGAIN
      </button>

    </div>
  </main>

  <!-- =========================
       SCRIPT
  ========================= -->
  <script src="./app.js"></script>

</body>
</html>
