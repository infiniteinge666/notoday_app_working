<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NoToday</title>

  <link rel="stylesheet" href=".styles/styles.css" />
</head>

<body class="state-idle">

  <!-- BACKGROUND PULSE -->
  <div id="pulseBg"></div>

  <!-- MAIN CONTAINER -->
  <main class="app">

    <!-- LOGO -->
    <div class="logo-wrap">
      <img src="./assets/notoday-shield.svg" class="logo" />
    </div>

    <!-- GLASS PANEL -->
    <div class="glass-panel">

      <!-- INPUT -->
      <textarea 
        id="scanInput" 
        placeholder="Paste message, link, email..."
      ></textarea>

      <!-- ACTION BUTTONS -->
      <div class="actions">
        <button id="pasteBtn">Paste</button>
        <button id="uploadBtn">Upload</button>
        <button id="clearBtn">Clear</button>
      </div>

      <!-- RESULT -->
      <div id="resultBox">
        <h2 id="resultHeading"></h2>
        <p id="resultReason"></p>
      </div>

    </div>

    <!-- PRIMARY CTA -->
    <button id="scanBtn" class="scan-btn">
      RUN SCAN
    </button>

  </main>

  <input type="file" id="fileInput" accept="image/*" hidden />

  <script src="./app.js"></script>
</body>
</html>
