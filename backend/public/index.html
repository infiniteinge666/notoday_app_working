<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoToToday Scanner</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="state-idle">

  <div class="app">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img src="assets/notoday-shield.svg" class="logo" />
    </div>

    <!-- TITLE -->
    <h1 class="title">Check before you trust.</h1>

    <!-- ACTIONS -->
    <div class="top-actions">
      <button class="mini-btn">Clear</button>
      <button class="mini-btn">📷</button>
    </div>

    <!-- CARD -->
    <div class="card">
      <label class="label">Paste anything suspicious below</label>

      <textarea
        class="input"
        placeholder="Paste a message, link, email body, or scam wording here..."
      ></textarea>
    </div>

  </div>

  <!-- CTA -->
  <div class="bottom-bar">
    <button class="cta">RUN SCAN</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
