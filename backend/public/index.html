<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>NoToday</title>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="state-idle">

  <!-- BACKGROUND -->
  <div class="fx-layer"></div>
  <div class="fx-layer">
    <div class="dust"></div>
  </div>

  <!-- UI -->
  <main class="ui-layer">

    <img src="./assets/notoday-shield.svg" class="logo" />

    <div class="glass">

      <textarea id="scanInput" placeholder="Paste message, link, email..."></textarea>

      <div class="actions">
        <button id="pasteBtn">Paste</button>
        <button id="uploadBtn">Upload</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div id="resultBox">
        <h2 id="resultHeading"></h2>
        <p id="resultReason"></p>
      </div>

      <button id="scanBtn" class="cta">RUN SCAN</button>

    </div>

  </main>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" hidden />

  <!-- LOADER -->
  <div id="loaderOverlay" class="loader-overlay hidden">
    <div class="loader">
      <div class="loader-bar bar-1"></div>
      <div class="loader-bar bar-2"></div>
      <div class="loader-bar bar-3"></div>
      <div class="loader-bar bar-4"></div>
    </div>
  </div>

   <script src="/app.js?v=10"></script>

</body>
</html>
